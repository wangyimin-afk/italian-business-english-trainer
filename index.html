<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A focused trainer for understanding Italian-accented business English in professional meetings."
    />
    <title>意大利商务英语听力训练器</title>
    <link rel="stylesheet" href="styles.css?v=b7" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Italian Business English Lab</p>
        <h1>意大利商务英语听力训练器</h1>
      </div>
    </header>

    <main class="layout">
      <section class="panel library-panel" aria-labelledby="library-title">
        <div class="section-head">
          <div>
            <h2 id="library-title">背诵句库</h2>
            <p>按意大利商务英语常见表达方式整理。先读英文，再看中文意思，重点熟悉他们的句子节奏和逻辑。</p>
          </div>
          <button id="copyLibraryBtn" class="primary-btn" type="button">复制全部句库</button>
        </div>
        <div id="categoryTabs" class="tabs" aria-label="句库分类"></div>
        <div id="sentenceLibrary" class="sentence-library"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js?v=b7"></script>
  </body>
</html>
